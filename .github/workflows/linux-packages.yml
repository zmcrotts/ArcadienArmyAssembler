name: Build Linux Packages

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  linux-packages:
    name: AppImage and RPM
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install Linux packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Prepare runtime and icon
        run: |
          node scripts/write-crosshair-icon.js
          node scripts/build-user-runtime.js

      - name: Build AppImage and RPM
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --linux AppImage rpm --config.directories.output=release/linux

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: arcadien-army-assembler-linux
          path: |
            release/linux/*.AppImage
            release/linux/*.rpm
          if-no-files-found: error
