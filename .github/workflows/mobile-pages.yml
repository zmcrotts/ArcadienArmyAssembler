name: Publish Mobile Web App

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/mobile-pages.yml"
      - "data/**"
      - "mobile/**"
      - "package.json"
      - "package-lock.json"
      - "ui/assets/**"
      - "ui/onedrive-roster-sync.js"
      - "scripts/build-engine-ui-data.js"
      - "scripts/write-crosshair-icon.js"
      - "src/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build offline mobile app
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared roster data
        run: node scripts/build-engine-ui-data.js

      - name: Build mobile web app
        working-directory: mobile
        run: npm run build

      - name: Test source and built mobile app
        working-directory: mobile
        run: npm test && npm run test:built

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload mobile site
        uses: actions/upload-pages-artifact@v4
        with:
          path: mobile/dist-user

  deploy:
    name: Publish mobile app
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
